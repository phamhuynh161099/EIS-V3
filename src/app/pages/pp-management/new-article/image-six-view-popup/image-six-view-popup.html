<!-- Dùng Control Flow @if thay thế cho [style.display] -->
@if (!isActive()) {
<div styleClass="relative w-[70%] mx-auto mt-5">

    <!-- Spinner hiển thị khi isLoading() == true -->
    @if (isLoading()) {
    <div class="absolute inset-0 z-50 flex items-center justify-center bg-white/70">
        <p-progressSpinner ariaLabel="loading"></p-progressSpinner>
    </div>
    }

    <div>
        <label style="font-size: 20px;">{{ season() }}</label>
        <label style="font-size: 20px;">&nbsp;:&nbsp;</label>
        <label style="font-size: 20px;">{{ modelName() }}</label>
    </div>

    <div class="flex flex-wrap">
        <!-- Lặp mảng ảnh bằng @for (Cú pháp mới của Angular) -->
        @for (img of images(); track $index) {
        <div class="w-[33%]">
            <div style="font-size: 14px; padding: 5px 0;">{{ imageTitles[$index] }}</div>
            <img [src]="img" alt="Image Six View" style="max-width:100%; max-height: 80%; padding-top: 0.5rem;"
                loading="lazy">
        </div>
        }
    </div>
</div>
} @else {
<div styleClass="relative dark:bg-eis-dark-blue">

    @if (isLoading()) {
    <div class="absolute inset-0 z-50 flex items-center justify-center bg-white/70">
        <p-progressSpinner ariaLabel="loading"></p-progressSpinner>
    </div>
    }

    <div class="border-b-2 mb-2">
        <label style="font-size: 20px;">{{ season() }}</label>
        <label style="font-size: 20px;">&nbsp;:&nbsp;</label>
        <label style="font-size: 20px;">{{ modelName() }}</label>
    </div>

    <div class="flex flex-wrap gap-[10px]">
        @for (img of images(); track $index) {
        <div class="w-[32%] h-[200px] flex flex-col justify-center items-center mb-2 shadow-md">
            <p class="text-sm font-bold mb-2">{{ imageTitles[$index] }}</p>
            <img class="h-[100%]" [src]="img" alt="Image Six View" loading="lazy">
        </div>
        }
    </div>
</div>
}

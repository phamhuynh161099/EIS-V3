<section class="bg-red-300 overflow-y-scroll custom-main-wrapper p-2 space-y-2" [style.minHeight.px]="boxHeight()">
    <!-- PO Completion Dashboard Filter Block -->
    <section id="block-filter"  class="pcd-filter-block">

        <div class="pcd-filter-container">

            <div class="pcd-filter-left">

                <div class="pcd-fl-container">

                    <div class="pcd-fl-item">
                        <label class="mb-[5px]">Factory Filter</label><br />
                        <!-- <nb-select class="selectOption" placeholder="Factory" shape="round"
                            (selectedChange)="onSelectionChangeFactory($event)" [(selected)]="defaultFactory">

                            <nb-option *ngFor="let factory of listFactory;" [(value)]="factory.factory_name">
                                {{factory.factory_name}}
                            </nb-option>

                        </nb-select> -->
                        <p-select styleClass="selectOption" [options]="listFactory" optionLabel="factory_name"
                            optionValue="factory_name" [(ngModel)]="defaultFactory"
                            (ngModelChange)="onSelectionChangeFactory($event)" placeholder="Factory">
                        </p-select>
                    </div>

                    <div class="pcd-fl-item ml-[10px]">
                        <label class="mb-[5px]">Type</label><br />
                        <!-- <nb-select class="selectOption" placeholder="SDD" shape="round"
                            (selectedChange)="onSelectionChangeType($event)" [(selected)]="defaultType">
                            <nb-option [value]="'sdd'">
                                SDD
                            </nb-option>
                            <nb-option [value]="'crd'">
                                CRD
                            </nb-option>
                        </nb-select> -->

                        <p-select styleClass="selectOption"
                            [options]="[{label: 'SDD', value: 'sdd'}, {label: 'CRD', value: 'crd'}]" optionLabel="label"
                            optionValue="value" [(ngModel)]="defaultType"
                            (ngModelChange)="onSelectionChangeType($event)" placeholder="SDD">
                        </p-select>
                    </div>

                    <div class="pcd-fl-item" style="margin-left: 10px;">
                        <label class="mb-[5px]">From</label><br />
                        <!-- <nb-select class="selectOption" placeholder="From" shape="round"
                            (selectedChange)="onSelectionChangeDateFrom($event)" [(selected)]="defaultDateFrom">
                            <nb-option *ngFor="let date of lstOptionFromTo;" [(value)]="date.real_SDD">
                                {{date.filter_SDD}}
                            </nb-option>
                        </nb-select> -->
                        <p-select styleClass="selectOption" [options]="lstOptionFromTo" optionLabel="filter_SDD"
                            optionValue="real_SDD" [(ngModel)]="defaultDateFrom"
                            (ngModelChange)="onSelectionChangeDateFrom($event)" placeholder="From">
                        </p-select>
                    </div>

                    <div class="pcd-fl-item" style="margin-left: 10px;">
                        <label class="mb-[5px]">To</label><br />
                        <!-- <nb-select class="selectOption" placeholder="To" shape="round"
                            (selectedChange)="onSelectionChangeDateTo($event)" [(selected)]="defaultDateTo">
                            <nb-option *ngFor="let date of lstOptionFromTo;" [(value)]="date.real_SDD">
                                {{date.filter_SDD}}
                            </nb-option>
                        </nb-select> -->
                        <p-select styleClass="selectOption" [options]="lstOptionFromTo" optionLabel="filter_SDD"
                            optionValue="real_SDD" [(ngModel)]="defaultDateTo"
                            (ngModelChange)="onSelectionChangeDateTo($event)" placeholder="To">
                        </p-select>
                    </div>


                </div>


            </div>



            <div class="pcd-filter-right">

                <div class="pcd-fr-container">

                    <div class="pcd-fr-block-1">

                        <!-- <div class="wrapper__checkbox">
                            <nb-checkbox (checkedChange)="toggleInComplete($event)"
                                [checked]="checkedInComplete"></nb-checkbox>
                            <label class="checkbox-label">Incomplete</label>
                        </div>
                        <div class="wrapper__checkbox" style="margin-left: 10px;">
                            <nb-checkbox (checkedChange)="toggleAll($event)" [checked]="checkedAll"></nb-checkbox>
                            <label class="checkbox-label">All</label>
                        </div> -->

                        <div class="wrapper__checkbox">
                            <p-checkbox inputId="incomplete-cb" [binary]="true" [ngModel]="checkedInComplete"
                                (ngModelChange)="toggleInComplete($event)">
                            </p-checkbox>
                            <label for="incomplete-cb" class="checkbox-label ml-2">Incomplete</label>
                        </div>

                        <div class="wrapper__checkbox" style="margin-left: 10px;">
                            <p-checkbox inputId="all-cb" [binary]="true" [ngModel]="checkedAll"
                                (ngModelChange)="toggleAll($event)">
                            </p-checkbox>
                            <label for="all-cb" class="checkbox-label ml-2">All</label>
                        </div>

                    </div>

                    <div class="pcd-fr-block-2">
                        <div class="pcd-frb-2-container">
                            <div class="pcd-show-info-block h-[40px]">
                                <div class="w-[50%] flex items-center justify-center">
                                    <p class="pcd-show-info-title">TOTAL PO</p>
                                </div>
                                <div class="w-[50%] flex items-center justify-end bg-[#4e535e] rounded-[8px]">
                                    <p class="pcd-show-info-number text-gray-light dark:text-gray-dark">{{totalPO |
                                        number}}</p>
                                </div>
                            </div>

                            <div class="pcd-show-info-block h-[40px] mt-[5px]">
                                <div class="w-[50%] flex items-center justify-center">
                                    <p class="pcd-show-info-title">COMPLETED PO</p>
                                </div>
                                <div class="w-[50%] flex items-center justify-end bg-[#4e535e] rounded-[8px]">
                                    <p class="pcd-show-info-number text-gray-light dark:text-gray-dark">{{incompletedPO
                                        | number}}</p>
                                </div>
                            </div>

                        </div>

                    </div>

                    <div class="pcd-fr-block-3">
                        <div class="pcd-frb-3-container">
                            <div class="pcd-show-info-block" style="height: 85px;">
                                <div class="w-[50%] cus-text-center" style="width: 40%;">
                                    <p class="pcd-show-info-title-b">TOTAL <br /> PO STATUS</p>
                                </div>
                                <div class="w-[50%] cus-text-center"
                                    style="background-color: #4e535e;border-radius: 8px;width: 60%;">
                                    <p class="pcd-show-info-number-b">{{percentInfo}}%</p>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

            </div>

        </div>

    </section>
    <!-- End PO Completion Dashboard Filter Block -->

    <div id="block-main__content">
        <div id="grid_POD" class="grid_POD"></div>
    </div>
</section>

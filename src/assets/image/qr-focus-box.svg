    <path d="M20 30L20 24C20 20 20 20 24 20L30 20" stroke-width="1" stroke="#ffffff" fill="transparent" id="topLeftBorder" />
    <path d="M20 30L20 24C20 20 20 20 24 20L30 20" stroke-width="1" stroke="#ffffff" fill="transparent" id="topRightBorder" transform="rotate(90 20 20) translate(0 -50)" />
    <path d="M20 30L20 24C20 20 20 20 24 20L30 20" stroke-width="1" stroke="#ffffff" fill="transparent" id="bottomLeftBorder" transform="rotate(270 20 20) translate(-50 0)" />
    <path d="M20 30L20 24C20 20 20 20 24 20L30 20" stroke-width="1" stroke="#ffffff" fill="transparent" id="bottomRightBorder" transform="rotate(180 20 20) translate(-50 -50)" />

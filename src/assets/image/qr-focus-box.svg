<svg width="90" height="90" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
    <g id="focusBox">
        <mask id="focusBoxMask">
            <rect x="0" y="0" width="90" height="90" fill="#ffffff" />
            <rect x="20" y="20" width="50" height="50" fill="#000000" rx="2" />
        </mask>
        <rect id="overlay" x="0" y="0" width="90" height="90" fill="#000000" opacity="0.6" mask="url(#focusBoxMask)" />
